# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio

configSchema:
  type: object
  required:
    - tiingoApiKey
  properties:
    tiingoApiKey:
      type: string
      description: Your Tiingo API key. Get one free at https://api.tiingo.com

commandFunction:
  |-
    config => ({ command: 'uvx', args: ['tiingo-mcp'], env: { TIINGO_API_KEY: config.tiingoApiKey } })
